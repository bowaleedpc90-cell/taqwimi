<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="X Star Software">
  <defs>
    <linearGradient id="xsBg" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#181C26"/>
      <stop offset="1" stop-color="#06070B"/>
    </linearGradient>
    <linearGradient id="xsBlue" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="xsWhite" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D5DBE6"/>
    </linearGradient>
    <filter id="xsShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#xsBg)"/>
  <rect x="4" y="4" width="504" height="504" rx="112" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="3"/>

  <g filter="url(#xsShadow)" stroke-linecap="butt" stroke-width="56" fill="none">
    <line x1="134" y1="150" x2="240" y2="266" stroke="url(#xsWhite)"/>
    <line x1="238" y1="306" x2="132" y2="422" stroke="url(#xsWhite)"/>
    <line x1="378" y1="150" x2="272" y2="266" stroke="url(#xsBlue)"/>
    <line x1="274" y1="306" x2="380" y2="422" stroke="url(#xsBlue)"/>
  </g>

  <path d="M420 66 Q430 114 478 124 Q430 134 420 182 Q410 134 362 124 Q410 114 420 66 Z"
        fill="url(#xsBlue)" filter="url(#xsShadow)"/>
</svg>
