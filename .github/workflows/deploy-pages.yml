name: Test & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# No workflow-level write: the build job (which runs PR-authored code) gets
# read-only; only the deploy job is granted contents: write.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

# أمان سلسلة التوريد: كل Action مثبّتة على commit SHA (لا وسم متحرّك مثل @v4)،
# فلا يستطيع وسمٌ مُعاد توجيهه أو ناشرٌ مخترق تنفيذ كود جديد في خط النشر.
# Dependabot (.github/dependabot.yml) يرفع هذه الـ SHA عبر PR مراجَع.
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # لا تُبقِ GITHUB_TOKEN داخل .git/config أثناء npm ci / build:
          # خطوات البناء تشغّل كود طرف ثالث ولا تحتاج مصادقة Git إطلاقًا.
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests (calendar engine + Kuwait holidays + 180-day tracking)
        run: npm test
      - name: Static export build
        run: npm run build
      - name: Upload site artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site
          path: out

  deploy:
    # Production deploys only from main.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: site
          path: out
      # Pages serves the gh-pages branch ("deploy from a branch" mode).
      # peaceiris writes a .nojekyll file so the Next.js _next/ folder is served.
      # cname: يضمن بقاء الدومين المخصّص في gh-pages مع كل نشر ولا يُحذف أبدًا
      # (إضافةً إلى public/CNAME الذي يُنسخ تلقائيًا إلى out/CNAME).
      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: out
          cname: taqwimi.xstarkw.com
