version: 2
updates:
  # يرفع الـ commit SHA المثبّتة في .github/workflows عبر PR مراجَع،
  # فيبقى التثبيت آمنًا دون أن يتجمّد على إصدار قديم.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: 'chore(ci)'
    # سياسة: لا ترقيات رئيسية تلقائية — تُراجَع وتُختبر يدويًا لأنها كاسرة.
    # للتراجع: احذف كتلة ignore هذه فيعود Dependabot يقترح الرئيسية.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: 'chore(deps)'
    # نفس السياسة: لا ترقيات رئيسية تلقائية (كانت مجموعة dev تخفي 5 ترقيات
    # رئيسية خلف عنوان محايد). تنبيهات الأمان تصل دائمًا رغم ignore.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    # تحديثات الأمان تصل دائمًا؛ نجمّع الباقي لتقليل الضجيج.
    groups:
      dev-dependencies:
        dependency-type: development
